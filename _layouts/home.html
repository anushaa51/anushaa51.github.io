---
layout: page
---
<div id="home">
  <div class="row">
    <!-- Aside Navigation  -->
    <aside id="aside" class="col-md-4">
      {% include aside.html %}
    </aside>

    <!-- career section -->
    <div id="protfolio">
      <section id="career" class="row">
        <article class="exper col-12 col-md-6">
          <p class="title">EXPERIENCE</p>
          <ul class="exper-list">
            {% for exp in profile.experience %}
            <li class="meta">
              <p class="date">{{ exp.start }} ~ {{ exp.end }}</p>
              <p class="description">{{ exp.experience }}</p>
            </li>
            {% endfor %}
          </ul>
        </article>
        <article class="skills col-12 col-md-6">
          <p class="title">SKILLS</p>
          <ul class="skill-list">
            {% for _ in profile.skills %}
            <li class="skill">
              <p class="name">{{ _.skill }}</p>
              <div class="progress">
                <div class="progress-bar" style="width: {{ _.value }}%">
                  <div class="progress-value">{{ _.value }}%</div>
                </div>
              </div>
            </li>
            {% endfor %}
          </ul>
        </article>
      </section>
    </div>
  </div>
</div>
